name: CI

on:
  push:
    branches: [dev, main, master, staging]
    tags: ["v*"]
  pull_request:
    branches: [dev, main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: write

jobs:
  ci:
    uses: 1121citrus/shared-github-workflows/.github/workflows/pipeline.yml@v1
    with:
      image: 1121citrus/usb-explore
      inject-metadata: true
      test-mode: bats-docker-cli
      test-bats-files: |
        test/01-build.bats
        test/02-image-structure.bats
        test/03-invocation.bats
        test/04-env-metadata.bats
        test/05-partition-discovery.bats
        test/06-subcommands.bats
        test/07-capture.bats
        test/08-cli.bats
        test/09-install.bats
        test/10-runtime-compat.bats
      test-pre-command: bash test/fixtures/generate.sh
      trivyignore: .trivyignore.yaml
    secrets: inherit
